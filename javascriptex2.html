<!doctype html>
<html lang="en">
  <head>
    <title>Javascript Data Types and Varialbes Example</title>
    <meta name="viewport" content="width=device-width,intial-scale=1.0" />
    <meta charset="utf-8" />
    <link rel="stylesheet" href="mystyles.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />
    <script>
      // variabels in javascript
      function fvar() {
        let x = 10;
        let y = 5;
        let z = x + y;
        window.alert(z);
      }

      // const variabels in javascript
      function fconstvar() {
        const course = "python full stack";
        window.alert(course);
      }

      // Boolean data type in JS
      function fbool() {
        let is_enroll = true;
        let is_not_enroll = false;
        window.alert(is_enroll);
        window.alert(is_not_enroll);
      }

      //Object data type in JS

      function fobject() {
        const course1 = {
          "course name": "python full stack",
          "course duration": "5-6 months",
        };

        window.alert(
          "Course Name: " +
            course1["course name"] +
            "\nCourse Duration: " +
            course1["course duration"],
        );
      }
    </script>
  </head>
  <body>
    <h2>let variable in js:</h2>

    <button onclick="fvar()" type="submit" value="result">Result</button>
    <br />
    <br />
    <h2>const variable in js:</h2>
    <button onclick="fconstvar()">clike me</button>
    <br />
    <br />
    <h2>boolean data type in js:</h2>
    <button onclick="fbool()">clike here</button>
    <br />
    <br />

    <h2>object data type in js:</h2>
    <button onclick="fobject()">clike here</button>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
