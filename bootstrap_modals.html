<!--modals Implementation-->
<!--doctype standard tag is must for bootstrap-->
<!doctype html>
<html lang="en">
  <head>
    <title>Bootstrap Modal ex-1</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="mystyles1.css" />
  </head>
  <body>
    <h1>Modals Example Program</h1>
    <br />
    <button
      data-bs-toggle="modal"
      data-bs-target="#mymodal"
      class="btn btn-success display-2 fw-bold ms-3 p-2"
    >
      Click here to open modal
    </button>

    <br /><br /><br />
    <!--tooltip example-->
    <button
      data-bs-toggle="tooltip"
      title="Welcome to lakshmi telugu tech"
      class="btn btn-warning ms-3 p-2 display-2 fw-bold"
    >
      Hello
    </button>
    <div class="modal" id="mymodal">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h4 class="modal-title">Special Note-1:</h4>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            We are going to convert project-1 into bootstrap shortly....
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-danger"
              data-bs-dismiss="modal"
            >
              Close
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal" id="mymodal1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h4 class="modal-title">Special Note-2:</h4>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            We are going to convert project-1 into bootstrap shortly....
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-success"
              data-bs-dismiss="modal"
            >
              Submit
            </button>
          </div>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
