<!doctype html>
<html lang="en">
  <head>
    <title>Comparision Operators in Javascript</title>
    <meta name="viewport" content="width=device-width,intial-scale=1.0" />
    <meta charset="utf-8" />

    <script src="myjsfile1.js"></script>
  </head>
  <body>
    <h2>Comparision Operators:</h2>
    vaule1: <input type="text" id="value1" name="value1" /><br /><br />
    vaule2: <input type="text" id="value2" name="value2" /><br /><br />

    <button onclick="fequalto()" type="button" value="calculate">==</button>

    <button onclick="fequalwithtype()" type="button" value="calculate">
      ===
    </button>

    <button onclick="fnotequal()" type="button" value="calculate">!=</button>

    <button onclick="fnotequalwithtype()" type="button" value="calculate">
      !==
    </button>

    <button onclick="fgreaterthan()" type="button" value="calculate">
      &gt;
    </button>

    <button onclick="flessthan()" type="button" value="calculate">&lt;</button>
    <button onclick="fgtoreuqualto()" type="button" value="calculate">
      &gt;=
    </button>

    <button onclick="fltorequalto()" type="button" value="calculate">
      &lt;=
    </button>
    <br /><br />

    Result :
    <input type="text" id="res" name="res" /><br /><br />
  </body>
</html>
