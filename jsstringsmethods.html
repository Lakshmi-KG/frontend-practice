<!doctype html>
<html lang="en">
  <head>
    <title>String Methods in Js</title>
    <meta name="viewport" content="width=device-width,intial-scale=1.0" />
    <meta charset="utf-8" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />
    <script>
      document.write("<h1>Strings concatenation </h1>");
      let first_name = "Lakshmi";
      let last_name = "Kuram Galla";
      document.write(" <em>concatenation of two strings with + : </em><br/>");
      document.write(first_name + " " + last_name);
      document.write("<br><br>");

      document.write(" <strong>numbers concatenation : </strong><br/>");
      let a = 20;
      let b = 30;
      let c = a + b;

      document.write("Result  is : " + c + "<br/>");
      document.write("sum of 20,30 is : " + c + "<br/>");
      // Sum of 20,30 is:50
      document.write("Sum of " + a + "," + b + "  is : " + c + "<br/>");
      // "Sum of" 20,30 is:50
      document.write('"Sum of "  ' + a + " , " + b + " is : " + c); // "/"sum of"/" or '"sum of"'

      // template strings -back tic symbol
      document.write(
        "<br/> <strong> template strings or string templates with interpolation : </strong><br/>",
      );
      //template strings or string templates with interpolation
      document.write(`Sum of  ${a},${b} is : ${a + b} <br/>`);
      let p = `I am
               Lakshmi
        from 
                 AP`;
      window.alert(p);
      document.write("<br><br/><br><br/>");
      document.write("<h2>length() method:</h2>");
      let course = "python full stack";
      let platform = "Telugu Webguru";
      document.write(course.length); // length method is used for to find entire string length

      // these all methods are used for index retrieving
      document.write("<h2>[] and at() and charAt() methods:</h2>");
      let name = "Lakshmi Kuram Galla";
      document.write(name.at(2)); //the method at() retrieve both postive and negative index.
      document.write("<br>");
      document.write(name.charAt(14));
      document.write("<br>");
      document.write(name[6]);

      //getting utf-16 code of a character at particular index in a string
      document.write("<h2>charCodeAt() method:</h2>");
      let name1 = "Varun Kuram GallA";
      document.write(name1.charCodeAt(0)); //  NaN for -ve indexes

      document.write("<h2>codePointAt() method:</h2>");
      let lan = "Telugu";
      document.write(lan.codePointAt(0)); //  Undefined for -ve indexes

      // concatenation using concat method
      document.write("<h2>concat method:</h2>");
      let cousrse1 = "Python";
      let course2 = "and Java";
      document.write(cousrse1.concat(" ", course2));

      // slice method - substring
      document.write("<h2>slice method - substring:</h2>");
      let Name = "Aparana Kuram Galla";
      document.write(Name.slice(0, 8)); // from 0 to 7
      document.write("<br>");
      document.write(Name.slice(-19, -1)); // from -19 t0 -1

      // subsrting method - subsrting
      document.write("<h2>subsrting method - subsrting:</h2>");
      let lang1 = "Java Program";

      document.write(lang1.substring(0, 4)); // from 0 to 3
      document.write("<br>");
      document.write(lang1.substring(-4)); // negative values are considered as 0 in substring

      // toUpperCase and toLowerCase methods
      document.write("<h2>toUpperCase method:</h2>");
      let myname = "lakshmi kuram galla";
      document.write(myname.toUpperCase()); // convert into uppercase
      document.write("<br>");
      document.write("<h2>toLowerCase method:</h2>");
      let myname1 = "VARUN KURAM GALLA";
      document.write(myname1.toLowerCase()); // convert into lowercase

      // toWellFormed and isWellFormed methods
      document.write("<h2>isWellFormed method:</h2>");
      let n = "shjknoinbyubxf@#$%&*";
      document.write(n.isWellFormed());
      document.write("<h2>toWellFormed method:</h2>");
      let n1 = "Hello \uD800"; // lone surrogates
      document.write(n.isWellFormed());
      document.write("<br>");
      document.write(n1.toWellFormed());

      // trim and trim-end , trim-start methods
      document.write("<h2>trim and trim-end , trim-start methods:</h2>");
      let myname2 = " lakshmi kuram galla ";
      document.write(myname2.length);
      document.write(" : total  string length ");
      document.write("<br>");
      let tname = myname2.trim();
      document.write(tname.length);
      document.write(
        " : both trim on both sides for  string  and final length",
      );
      document.write("<br>");

      // trim-start
      let tname1 = myname2.trimStart();
      document.write(tname1.length);
      document.write(" : trimEnd for string and final length of string ");
      document.write("<br>");

      // trim-end
      let tname2 = myname2.trimEnd();
      document.write(tname2.length);
      document.write(" : trimStart for string and final length of string ");
      document.write("<br>");
      document.write("<br>");

      // padStart and padEnd methods
      document.write("<h2> padStart and padEnd methods:</h2>");
      let cname = "Telugu webguru";
      document.write(cname.padStart(18, " 1. "));
      document.write("<br>");
      document.write(cname.padEnd(18, " - 2 "));

      // repeat method
      document.write("<br>");
      document.write("<br>");
      document.write("<h2> repeat method :</h2>");
      let h = "Welcome";
      let i = (h + "  ").repeat(3);
      document.write(i);

      // replace method
      document.write("<br>");
      document.write("<br>");
      document.write("<h2> replace method :</h2>");
      let fullname = "Lakshmi Keram alla";
      fullname = fullname.replace("Keram", "Kuram").replace("alla", "Galla");
      document.write(fullname);

      // replaceAll method
      document.write("<br>");
      document.write("<br>");
      document.write("<h2> replaceAll method :</h2>");
      let str = "I am learning Js in Twg";
      str = str.replaceAll(
        "I am learning Js in Twg",
        "I am Learning JavaScript In Telugu WebGuru",
      );

      // split method

      document.write(str);
      document.write("<br>");
      document.write("<br>");
      document.write("<h2> Split method :</h2>");
      let str1 =
        "I am learning - JavaScript in Telugu Webguru - Platform - In Telugu";
      document.write(str1.split("-"));
      document.write("<br>");
      document.write("<br>");
    </script>
  </head>
  <body>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
