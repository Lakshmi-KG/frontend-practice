<!doctype html>
<html lang="en">
  <head>
    <title>Selection Statements Example</title>
    <meta name="viewport" content="width=device-width,intial-scale=1.0" />
    <meta charset="utf-8" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <h2 class="text-center">Selection Statements In JS</h2>
    <br /><br />
    <div class="row ms-5 ps-5 mx-auto container-fluid">
      <div class="col">
        <h4 class="text text-primary">if and if-else:</h4>
        <br />
        Value 1: <input type="text" id="value1" name="value1" /><br /><br />
        Value 2: <input type="text" id="value2" name="value2" /><br /><br />

        <button onclick="fsif()" class="m-2">Sif Check</button>
        <button type="button" onclick="fifelse()">if-else button</button>
        <br /><br />
        Result: <input type="text" id="res" /> <br /><br />
      </div>

      <div class="col">
        <h4 class="text text-primary">if else-if else Example program:</h4>
        Enter Your Problem :<br />
        <select id="num1" class="form-select w-50">
          <option value="">-- Select --</option>
          <option value="2days">fever since 2 days</option>
          <option value="1week">fever since 1 week</option>
          <option value="15days">fever since 15 days</option>
          <option value="other">Head ache</option></select
        ><br />
        <button type="button" onclick="f()" class="btn btn-success m-2">
          submit
        </button>
        <br />
        Solution:<br />
        <input type="text" id="nres" class="w-50" />
      </div>
    </div>

    <br /><br /><br />
    <div class="container">
      <h4 class="text text-primary">Nested if:</h4>
      <br />
      Value 1: <input type="text" id="n1" name="n1" /><br /><br />
      Value 2: <input type="text" id="n2" name="n2" /><br /><br />
      Value 3: <input type="text" id="n3" name="n3" /><br /><br />

      <button onclick="fnestedif()" class="m-2">Nested-if</button>
      <br /><br />
      Result: <input type="text" id="ns" class="w-50"/> <br /><br />
    </div>

    <script>
      // this code is check whether x is bigger than y or not
      function fsif() {
        let x = parseInt(document.getElementById("value1").value);
        let y = parseInt(document.getElementById("value2").value);

        if (x < y) {
          document.getElementById("res").value = "x is smaller than y";
        }
      }

      function f() {
        let x = document.getElementById("num1").value;
        if (x === "2days") {
          document.getElementById("nres").value = "simple prescription";
        } else if (x === "1week") {
          document.getElementById("nres").value = "medicine with antibiotics";
        } else if (x === "15days") {
          document.getElementById("nres").value = "Blood Test";
        } else {
          document.getElementById("nres").value = "Counselling";
        }
      }

      // this code is check whether a  is bigger than both b and c  or not
      function fnestedif() {
        let a = parseInt(document.getElementById("n1").value);
        let b = parseInt(document.getElementById("n2").value);
        let c = parseInt(document.getElementById("n3").value);
        // dangling else problem
        if (a > b) {
          if (b > c) {
            document.getElementById("ns").value =
              "a is bigger than both b and c";
          } else {
            document.getElementById("ns").value =
              "a is bigger than b but b smaller than c";
          }
        } else {
          document.getElementById("ns").value =
            "a is smaller than both b and c ";
        }
      }
    </script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
