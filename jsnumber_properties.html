<!doctype html>
<html lang="en">
  <head>
    <title>Numbers Properties in Js</title>
    <meta name="viewport" content="width=device-width,intial-scale=1.0" />
    <meta charset="utf-8" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />
    <script>
      document.write("<div class='ms-5 p-5'>");
      document.write("<h1 class='text-danger'>Numbers Properties:</h1><br/>");
      document.write("<b>EPSILON</b><br/>");
      let a = Number.EPSILON;
      document.write(a);
      document.write("<br/><br/><b>MAX_VALUE</b><br/>");
      let r = Number.MAX_VALUE;
      document.write(r);
      document.write("<br/><br/><b>MIN_VALUE</b><br/>");
      let p = Number.MIN_VALUE;
      document.write(p);
      document.write("<br/><br/><b>MAX_SAFE_INTEGER</b><br/>");
      let t = Number.MAX_SAFE_INTEGER; // interger no exponentials
      document.write(t);
      document.write("<br/><br/><b>MIn_SAFE_INTEGER</b><br/>");
      let x = Number.MIN_SAFE_INTEGER; // interger no exponentials
      document.write(x);
      document.write("</div>");
    </script>
  </head>
  <body>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
