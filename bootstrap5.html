<!--Carousel Implementation-->
<!--doctype standard tag is must for bootstrap-->
<!doctype html>
<html lang="en">
  <head>
    <title>Bootstrap ex5</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="mystyles1.css" />
  </head>
  <body>
    <h1>Carousel Example Program</h1>
    <div id="mycarousel" class="carousel slide" data-bs-ride="carousel">
      <!--carousel indicator buttons to reach the slide directly-->
      <div class="carousel-indicators">
        <button
          type="button"
          data-bs-target="#mycarousel"
          data-bs-slide-to="0"
          class="active"
        ></button>
        <button
          type="button"
          data-bs-target="#mycarousel"
          data-bs-slide-to="1"
        ></button>

        <button
          type="button"
          data-bs-target="#mycarousel"
          data-bs-slide-to="2"
        ></button>
      </div>

      <!--this is carousel inner part with carousel items-->
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img
            src="images/img1.jpg"
            alt="image1 in slide1"
            class="d-block w-100"
          />
        </div>

        <div class="carousel-item">
          <img
            src="images/img2.jpg"
            alt="image2 in slide2"
            class="d-block w-100"
          />
        </div>

        <div class="carousel-item">
          <img
            src="images/img3.jpg"
            alt="image3 in slide3"
            class="d-block w-100"
          />
        </div>
      </div>

      <!--adding prev and next buttons-->
      <button
        class="carousel-control-prev"
        type="button"
        data-bs-target="#mycarousel"
        data-bs-slide="prev"
      >
        <span class="carousel-control-prev-icon w-25 h-25"></span>
      </button>

      <button
        class="carousel-control-next"
        type="button"
        data-bs-target="#mycarousel"
        data-bs-slide="next"
      >
        <span class="carousel-control-next-icon w-25 h-25"></span>
      </button>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
