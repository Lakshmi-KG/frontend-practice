<!doctype html>
<html lang="en">
  <head>
    <title>Login form</title>
    <link rel="stylesheet" href="css/styles.css" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  </head>
  <body>
    <!--Login form-->
    <form class="loginform flexcolumn">
      <h1 class="login-h1">Login Form</h1>
      <div class="subdiv-1">
        <label for="username">Username:<sup>*</sup></label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Enter Userame"
          required
        />
      </div>
      <div class="subdiv-2">
        <label for="pwd">Password:<sup>*</sup></label>
        <input
          type="password"
          id="pwd"
          name="pwd"
          placeholder="Enter Password"
          required
        />
      </div>
      <br />
      <button type="submit" value="Login"><a href="index.html">Login</a></button>
      <div class="loginsubdiv-3">
        <div class="leftside-div">
          Don't have an account <a href="registerform.html">sin up</a>
        </div>
        <div class="rightside-div"><a href="#">Forgot Password ?</a></div>
      </div>
    </form>
  </body>
</html>
