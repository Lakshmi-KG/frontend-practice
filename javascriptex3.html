<!doctype html>
<html lang="en">
  <head>
    <title>Arithmetic Operators Example in Javascript</title>
    <meta name="viewport" content="width=device-width,intial-scale=1.0" />
    <meta charset="utf-8" />

    <script src="myjsfile.js"></script>
    <script></script>
  </head>
  <body>
    <h2>Arithmetic Operators:</h2>
    vaule1: <input type="text" id="value1" name="value1" /><br /><br />
    vaule2: <input type="text" id="value2" name="value2" /><br /><br />

    <button onclick="fadd()" type="button" value="calculate">+</button>

    <button onclick="fsub()" type="button" value="calculate">-</button>

    <button onclick="fmul()" type="button" value="calculate">x</button>

    <button onclick="fdiv()" type="button" value="calculate">&divide;</button>

    <button onclick="fmoduls()" type="button" value="calculate">%</button>

    <button onclick="fexp()" type="button" value="calculate">**</button>

    <br /><br />
    Result :
    <input type="text" id="res" name="res" /><br /><br />

    <h2>Increment operator:</h2>
    <button onclick="fincrement()">++</button>
    <h2>Increment operator:</h2>
    <button onclick="fdecrement()">--</button>
    <script>
      // increment in arithmetic operators
      function fincrement() {
        let a = 10;
        a++;
        window.alert(a);
      }
      // decrement in arithmetic operators
      function fdecrement() {
        let a = 50;
        a--;
        window.alert(a);
      }
    </script>
  </body>
</html>
