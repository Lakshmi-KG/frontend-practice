<!--constructors example in js-->
<!doctype html>
<html lang="en">
  <head>
    <title>Constructors Example in Js</title>
    <meta name="viewport" content="width=device-width,intial-scale=1.0" />
    <meta charset="utf-8" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <h1 class="ms-4 mt-4">Student Details :</h1>
    <div id="stud" class="ms-5"></div>

    <script>
      // step-1: defoine object constructor
      // create a function with name start  upper case letter
      function Student(sname, age, marks) {
        this.sname = sname;
        this.age = age;
        this.marks = marks;
      }

      // object creation
      const students1 = new Student("Lakshmi", 21, 50);

      const students2 = new Student("Aparna", 91, 80);

      const students3 = new Student("Varun", 19, 95 + "<br> read very well");
      let x = "";
      for (let i in students3) {
        x = x + students3[i] + " ";
      }

      document.getElementById("stud").innerHTML = `${x} <br> `;
    </script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
