<!doctype html>
<html lang="en">
  <head>
    <title>Functions Ex-2 in Js</title>
    <meta name="viewport" content="width=device-width,intial-scale=1.0" />
    <meta charset="utf-8" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <h4 class="text-danger ms-4">Optional parameter and Arguments in JS</h4>
    <script>
      // function-declaration or function-definition
      // functions -> reuseable code blocks
      function addxy(a, b) {
        let x = a;
        let y = b;
        let z = a + b;
        console.log(`${z}`);
      }
      //function calling
      //reusing first time
      addxy(20, 40); // 20+40
      let p = "TWG";
      let c = "JavaScript";
      console.log(`${p}  ${c} `);
      addxy(50, 50); //50+50

      //reusing second time
      addxy(80, 60); //80+60
      console.log("Learning Function Concepts in javascript");


      // resusig third time
      let v1 = 120;
      let v2 = 50;
      addxy(v1, v2); //120+50
    </script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
