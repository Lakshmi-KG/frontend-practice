<!doctype html>
<html lang="en">
  <head>
    <title>Dates In Javascript Example</title>
    <meta name="viewport" content="width=device-width,intial-scale=1.0" />
    <meta charset="utf-8" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />
    <style type="text/css"></style>
  </head>
  <body>
    <h1 class="text-center text-danger pt-5">Dates In Javascript</h1>
    <div id="d1" class="ms-5 p-4 pt-5 text-center"></div>
    <div id="d2" class="ms-5 pt-3 pb-3 text-center">
      <h2 class="text-primary">Get methods</h2>
    </div>
    <div id="d3" class="ms-5 pt-3 pb-3 text-center">
      <h2 class="text-primary">Set methods</h2>
    </div>
    <script>
      // current date and time
      const d1 = new Date();
      document.getElementById("d1").innerHTML = ` d1 is : ${d1}`;

      // creating date object with our custom date value
      const d2 = new Date("2026-03-10");
      document.getElementById("d1").innerHTML += `<br/> <br/>d2  is : ${d2}`;

      const d3 = new Date("2025", "01", "10"); // month starts from 0
      document.getElementById("d1").innerHTML += `<br/> <br/>d3 is : ${d3}`;

      const d4 = new Date("2024", "03", "10", "15", "35", "15");
      document.getElementById("d1").innerHTML += `<br/> <br/>d4 is : ${d4}`;

      // get methods
      const d5 = new Date("2025/09/15");
      let year = d5.getFullYear();
      let month = d5.getMonth() + 1;
      let date = d5.getDate();
      document.getElementById("d2").innerHTML +=
        `d5  is : ${year}/${month}/${date}`;

      const d6 = new Date("2004-08-15");
      document.getElementById("d2").innerHTML +=
        `<br/><br/> dd/mm/yyyy <--> is : ${d6.getDate()}-${d6.getMonth() + 1}-${d6.getFullYear()}
               <br/><br/> d6 full year is : ${d6.getFullYear()}
               <br/><br/> d6 month is : ${d6.getMonth() + 1}`;

      //set methods
      d6.setFullYear(2026);
      document.getElementById("d3").innerHTML += `<br/> year  is set: ${d6}`;
      d6.setHours(14);
      document.getElementById("d3").innerHTML +=
        `<br/><br/>hours set for d6 : ${d6}`;
      document.getElementById("d3").innerHTML +=
        `<br/><br/>new date is : ${d6.getDate()}/${d6.getMonth() + 1}/${d6.getFullYear()}`;
      // string
      const d7 = d6.toString();
      document.getElementById("d3").innerHTML += `<br><br/>  ${d7}`;

      const d8 = d6.toUTCString();
      document.getElementById("d3").innerHTML +=
        `<br><br/> <b>Unsiversal Time </b><br/> ${d8}<br/><br/><br/>`;
    </script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
