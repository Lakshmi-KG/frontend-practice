<!doctype html>
<html lang="en">
  <head>
    <title>Empty object Creation and Indirect creation way in Js</title>
    <meta name="viewport" content="width=device-width,intial-scale=1.0" />
    <meta charset="utf-8" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <h1 class="ms-4 mt-4">Empolyee Details :</h1>
    <div id="emp" class="ms-5"></div>
    <br /><br />
    <h1 class="ms-4 mt-4">Vehicle Details:</h1>
    <div id="veh" class="ms-5"></div>

    <script>
      // Empty object creations in Js
      const empolyee = {};
      empolyee.empid = "sw1001";
      empolyee.ename = "Varun";
      empolyee.domain = "Python";
      document.getElementById("emp").innerHTML = `
         Emplyooe Id  : ${empolyee.empid}
        <br/>  Empolyee name : ${empolyee.ename}
        <br/>  Empolyee domain : ${empolyee.domain} <br/>`;

      //Indirect way for object creation in Js
      const vehicle = new Object({
        vehicle_name: "car",
        modal: "2026",
      });
      document.getElementById("veh").innerHTML = `
         Vehicle name : ${vehicle.vehicle_name}
        <br/> Vehicle modal : ${vehicle.modal}`;
    </script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
