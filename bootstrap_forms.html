<!--doctype standard tag is must for bootstrap-->
<!doctype html>
<html lang="en">
  <head>
    <title>Bootstrap Forms</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="mystyles2.css" />
  </head>
  <body>
    <h1 class="text-center">Registration Form</h1>
    <form
      action="getdata.py"
      method="GET"
      autocomplete="on"
      class="w-50 mx-auto m-5 p-5 border shadow"
    >
      <label for="un" class="form-label">Username:</label><sup>*</sup>
      <input
        id="un"
        name="uname"
        type="text"
        placeholder="letters+digits"
        required
        class="form-control"
      /><br />

      <label for="fn" class="label-control">Full Name:</label>
      <input type="text" id="fn" name="fullname" class="form-control" /><br />

      <label for="pwd" class="form-label">Password:</label><sup>*</sup>
      <input
        type="password"
        id="pwd"
        name="password"
        value="twg123"
        readonly
        class="form-control"
      /><br />

      Gender:

      <div class="row">
        <div class="form-check col-1">
          <input class="form-check-input" type="radio" id="m" name="gender" />
          <label for="m" class="form-check-label">Male</label>
        </div>

        <div class="form-check col-1">
          <input class="form-check-input" type="radio" id="f" name="gender" />
          <label for="f" class="form-check-label">Female</label> <br />
        </div>
      </div>

      <br />
      Languages Known:

      <div class="row">
        <div class="form-check col-2">
          <input class="form-check-input" type="checkbox" id="t" name="tel" />
          <label for="t" class="form-check-label">Telugu</label>
        </div>

        <div class="form-check col-2">
          <input class="form-check-input" type="checkbox" id="e" name="eng" />
          <label for="e" class="form-check-label">English</label>
        </div>

        <div class="form-check col-2">
          <input class="form-check-input" type="checkbox" id="h" name="hin" />
          <label for="h" class="form-check-label">Hindi</label><br />
        </div>
      </div>

      <br />
      <label for="em" class="form-label">Email ID:</label>
      <input
        type="email"
        id="em"
        name="email"
        autofocus
        class="form-control"
      /><br />

      <label for="mob" class="form-label">Mobile:</label>
      <input
        type="tel"
        id="mob"
        name="mobile"
        placeholder="+91-9640774038"
        class="form-control"
      />

      <br />
      <fieldset>
        <legend>DOB</legend>
        <label for="dob" class="form-label">Date of Birth:</label>
        <input
          type="date"
          id="dob"
          name="birthdate"
          min="2000-01-01"
          max="2010-12-31"
          class="form-control"
        /><br />

        <label for="tob" class="form-label">Time of Birth:</label>
        <input type="time" id="tob" name="birthtime" class="form-control" />
      </fieldset>

      <br />

      <label for="proflink" class="form-label">Profile URL</label>
      <input
        type="url"
        id="proflink"
        name="profile"
        class="form-control"
      /><br />

      <label for="c" class="form-label">Favorite Color:</label>
      <input type="color" id="c" name="clr" class="form-control" /><br />

      <label for="b" class="form-label">How many cricket bats required:</label>
      <input
        type="range"
        min="0"
        max="5"
        id="b"
        name="bat"
        class="form-range"
      /><br />

      <label for="addr" class="form-label">Address</label>
      <textarea rows="5" cols="30" class="form-control"> </textarea>
      <br />

      <label for="cntry" class="form-label">country</label>
      <select id="cntry" name="country" class="form-select">
        <option>IN</option>
        <option>US</option>
        <option>UK</option></select
      ><br />

      <label for="fc" class="form-label"
        >mention favorite color for gift:</label
      >
      <input list="clrs" id="fc" name-="fc" class="form-control" />

      <datalist id="clrs">
        <option value="Red"></option>
        <option value="Green"></option>
        <option value="Blue"></option>
      </datalist>

      <br />

      <label for="cv" class="form-label">Upload CV:</label>
      <input
        type="file"
        id="cv"
        name="cv"
        multiple
        class="form-control"
      /><br />

      <input
        class="btn btn-warning w-100"
        type="reset"
        class="form-control d-block"
      /><br /><br />

      <input
        class="btn btn-success w-100"
        type="submit"
        value="Register"
        class="form-control d-block"
      />
    </form>

    <br /><br /><br /><br /><br />
    <!--cards program -->
    <div class="row">
      <div class="card col border-top">
        <img class="card-img-bottom" src="images/logo.png" />
        <div class="card-header">Course</div>
        <div class="card-body">Python</div>
        <div class="card-footer">in telugu</div>
      </div>

      <div class="card col border-end">
        <img class="card-img-bottom" src="images/logo.png" />   
        <div class="card-header">Course</div>
        <div class="card-body">Python</div>
        <div class="card-footer">in telugu</div>
       
      </div>

      <div class="card col border border-top">
        <div class="card-header">Course</div>
        <div class="card-body">Python</div>
        <div class="card-footer">in telugu</div>
        <img class="card-img-bottom" src="images/logo.png" />
      </div>

      <div class="card col border-bottom">
        <div class="card-header">Course</div>
        <div class="card-body">Python</div>
        <div class="card-footer">in telugu</div>
        <img class="card-img-bottom" src="images/logo.png" />
      </div>
    </div>
    <br /><br /><br />

    <div class="container border mt-4">
      <span class="align-top"> hi</span>
      <span class="align-middle"> hello</span>
      <span class="align-text-bottom"> welcome</span>
    </div>

    <br /><br /><br /><br /><br /><br />

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
