<!doctype html>
<html lang="en">
  <head>
    <title>Selection Statements Example</title>
    <meta name="viewport" content="width=device-width,intial-scale=1.0" />
    <meta charset="utf-8" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />
    <script>
      function f() {
        const val = document.getElementById("snum").value;
        switch (val) {
          case "0":
            document.getElementById("sres").value = "x value is 0";
            break;
          case "1":
            document.getElementById("sres").value = "x value is 1";
            break;
          case "2":
            document.getElementById("sres").value = "x value is 2";
            break;
          case "3":
            document.getElementById("sres").value = "x value is 3";
            break;
          case "4":
            document.getElementById("sres").value = "x value is 4";
            break;
          default:
            document.getElementById("sres").value =
              "x value is other than 0,1,2,3,4";
        }
      }
    </script>
  </head>
  <body>
    <h2 class="text-center">Selection Statements In JS</h2>
    <br /><br />
    <div class="container mt-4 w-50">
      <h4>Switch In Js</h4>
      Enter your value :<br />
      <select id="snum" class="form-select w-50">
        <option value="">-- Select --</option>
        <option value="0">0</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="other">abc</option></select
      ><br />
      <button type="button" onclick="f()" class="mb-1">Submit</button><br />
      Result :<br />
      <input type="text" id="sres" name="sres" /><br /><br />
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
