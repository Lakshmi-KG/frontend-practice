<!doctype html>
<html lang="en">
  <head>
    <title>Numbers Methods in Js</title>
    <meta name="viewport" content="width=device-width,intial-scale=1.0" />
    <meta charset="utf-8" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />
    <script>
      document.write("<h1>Numbers Methods </h1>");
      document.write("<b>toString()</b><br/>");
      let a = 21.45678;
      let b = a.toString();
      let c = b.concat(" " + "Hello");
      document.write(c);
      document.write("<br/><b>toExponential()</b><br/>");
      let x = 11.255679;
      let p = x.toExponential(3);
      document.write(p);
      document.write("<br/><b>toFixed()</b><br/>");
      y = x.toFixed(3); // after decimal point give 3 numbers
      document.write(y);
      document.write("<br/><b>toPrecision()</b><br/>");
      let q = x.toPrecision(5); // total numbers 5
      document.write(q);
      document.write("<br/><b>valueOf()</b><br/>");
      // convert object to primitive type is valueOf()
      let r = 10; // a is primitive type
      document.write("primitive -" + r  + " <br/> ");
      let n = Number(10); // here n is object
      let m = n.valueOf(n);
      document.write("object -" + m);
    </script>
  </head>
  <body>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
