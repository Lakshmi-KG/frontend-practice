<!--Call by Object/Reference-->
<!--doctype standrd tag is must for bootstrap-->
<!doctype html>
<html lang="en">
  <head>
    <title>Functions Ex-6 in Js</title>
    <meta name="viewport" content="width=device-width,intial-scale=1.0" />
    <meta charset="utf-8" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <h4 class="text-danger ms-4">Call by Object/Reference</h4>
    <script>
      // functions -> reuseable code blocks
      // we can also setup default values to the parameters.
      // Call by Object/Reference--- parameter changes effect arguments
      function show(a) {
        a.name = "varun";
        a.marks = 95;
        return a; //  return value_exit from the function
        console.log("after return z statement "); // never executed
      }

      //reusing first time
      let v1 = { name: "lakshmi", marks: 90 }; // object
      console.log(`v1 value before function call are ${v1.name},${v1.marks}`);
      let res = show(v1); // function call
      console.log(`v1 value after function call are ${v1.name},${v1.marks}`);

      console.log(`Result is : ${res.name},${res.marks}`);
    </script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
