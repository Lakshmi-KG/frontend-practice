<!doctype html>
<html lang="en">
  <head>
    <title>Selection Statements Example</title>
    <meta name="viewport" content="width=device-width,intial-scale=1.0" />
    <meta charset="utf-8" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />
    <script>
      function f() {
        let x = Number(document.getElementById("x").value);
        let y = Number(document.getElementById("y").value);
        document.getElementById("r").value = x > y ? "X is big" : "y is big";
      }
    </script>
  </head>
  <body>
    <h2 class="text-center">Selection Statements In JS</h2>
    <br /><br />
    <div class="container mt-4 w-50">
      <h4>Ternary In Js</h4>
      Enter x value :<br />
      <input type="text" id="x" name="x" /><br /><br />
      Enter y value:<br />
      <input type="text" id="y" name="y" /><br /><br />

      <button type="button" onclick="f()" class="mb-1">Submit</button><br />
      Result :<br />
      <input type="text" id="r" name="r" /><br /><br />
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
