<!--doctype standrd tag is must for bootstrap-->
<!doctype html>
<html lang="en">
  <head>
    <title>Functions Ex-7 in Js</title>
    <meta name="viewport" content="width=device-width,intial-scale=1.0" />
    <meta charset="utf-8" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <h4 class="text-danger ms-4">Functions as a Arguments</h4>
    <script>
      // functions -> reuseable code blocks
      // we can also setup default values to the parameters.

      function showxy(a, b) {
        a();
        b();
      }

      function f1() {
        console.log("hello");
      }

      function f2() {
        console.log("welcome");
      }

      //reusing first time
      showxy(f1, f2);
    </script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
