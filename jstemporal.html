<!--this program demonstrates Temporal -->
<!doctype html>
<html lang="en">
  <head>
    <title>Temporal In Javascript Example</title>
    <meta name="viewport" content="width=device-width,intial-scale=1.0" />
    <meta charset="utf-8" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />
    <style type="text/css"></style>
  </head>
  <body>
    <script>
      // current time
      const d1 = Temporal.Now.plainDateTimeISO();
      console.log(`d1 is plainDateTime : ${d1}`);

      const d2 = Temporal.Now.plainDateTimeISO();
      console.log("Current time is " + d2.toString());

      const d = Temporal.Now.plainDateISO();
      console.log("d is plainDate : " + d.toString());

      // instant always follows UTC
      const d3 = Temporal.Now.instant();
      console.log("d3 is  Temporal.Now.instant : " + d3.toString());

      // customed time with instant
      const d4 = Temporal.Instant.from(
        "2024-04-24T12:32:24.388120117Z",
      ).toString();
      console.log("customed time set: " + d4);
      const d5 = Temporal.PlainDate.from("2004-08-15");
      console.log("customed time with plainDate: " + d5.toString());

      const d6 = Temporal.PlainTime.from("11:45:23");
      console.log("customed time with plainTime: " + d6.toString());

      const d7 = Temporal.PlainDateTime.from("2004-08-15T10:35:20");
      console.log("customed time with PlainDateTime: " + d7.toString());
      // zoneddatetime

      const d8 = Temporal.ZonedDateTime.from(
        "2004-08-15T10:35:20+05:30[Asia/Kolkata]",
      );
      console.log("d8 is customed time with ZonedDateTime: " + d8.toString());

      //duration
      const d9 = Temporal.Duration.from({ days: 7, hours: 6, minutes: 50 });
      console.log(" customed Duration : " + d9.toString());

      //Arithmetic Operations with temporal
      console.log(
        "d8 after 2 months 10 days: " +
          d8.add({ month: 2, days: 10 }).toString(),
      );

      // check d8 after add 2months 20 days
      console.log("after aritmetic operation: " + d8.toString());//temporal immutable
    </script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
